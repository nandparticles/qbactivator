name: Build SNL Solution

on: [push]

jobs:
  build:
    runs-on: windows-latest  # Or ubuntu-latest for .NET Core/5+

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Specify your .NET version

    - name: Build with dotnet
      run: dotnet build YourSolutionName.sln --configuration Release
